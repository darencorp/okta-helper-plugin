<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okta Login Helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1d1d21;
      background: #fff;
      width: 320px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }

    header img {
      width: 32px;
      height: 32px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00297a;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6e6e78;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c4c4c9;
      border-radius: 6px;
      font-size: 14px;
      color: #1d1d21;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: #00297a;
      box-shadow: 0 0 0 3px rgba(0, 41, 122, 0.12);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-label {
      font-size: 14px;
      color: #1d1d21;
      font-weight: 400;
    }

    .toggle-sub {
      font-size: 11px;
      color: #6e6e78;
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #c4c4c9;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #00297a;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 12px 0;
    }

    .btn-save {
      width: 100%;
      padding: 9px;
      background: #00297a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover {
      background: #003da6;
    }

    .btn-save:active {
      background: #001f5e;
    }

    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
      color: #007a3d;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.visible {
      opacity: 1;
    }

    .status.error {
      color: #d50000;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="Okta logo" />
    <h1>Okta Login Helper</h1>
  </header>

  <div class="form-group">
    <label for="username">Default Username / Email</label>
    <input
      type="text"
      id="username"
      placeholder="you@example.com"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <hr class="divider" />

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Check "Remember Me"</div>
      <div class="toggle-sub">Tick the remember login checkbox automatically</div>
    </div>
    <label class="toggle" aria-label="Toggle remember me">
      <input type="checkbox" id="rememberMe" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Auto-click Next</div>
      <div class="toggle-sub">Submit the username form automatically</div>
    </div>
    <label class="toggle" aria-label="Toggle auto-click next">
      <input type="checkbox" id="autoNext" />
      <span class="slider"></span>
    </label>
  </div>

  <hr class="divider" />

  <button class="btn-save" id="saveBtn">Save Settings</button>
  <div class="status" id="status" role="status" aria-live="polite"></div>

  <script src="popup.js"></script>
</body>
</html>
